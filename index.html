<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>GolfStats – Aplikacja dla golfistów i trenerów</title>
    <meta name="description" content="GolfStats – aplikacja dla golfistów i trenerów. Śledź statystyki, analizuj grę i współpracuj z trenerem." />

    <!-- Canonical -->
    <link rel="canonical" href="https://golfstats.pl" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Theme color -->
    <meta name="theme-color" content="#0a4d3c" />
    <meta name="color-scheme" content="dark" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/logo_golfstats.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://golfstats.pl" />
    <meta property="og:title" content="GolfStats – Aplikacja dla golfistów i trenerów" />
    <meta property="og:description" content="GolfStats – aplikacja dla golfistów i trenerów. Śledź statystyki, analizuj grę i współpracuj z trenerem." />
    <meta property="og:image" content="https://golfstats.pl/og-image.png" />
    <meta property="og:site_name" content="GolfStats" />
    <meta property="og:locale" content="pl_PL" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GolfStats – Aplikacja dla golfistów i trenerów" />
    <meta name="twitter:description" content="GolfStats – aplikacja dla golfistów i trenerów. Śledź statystyki, analizuj grę i współpracuj z trenerem." />
    <meta name="twitter:image" content="https://golfstats.pl/og-image.png" />

    <!-- Prevent white flash before React renders -->
    <style>body{background:#081210;margin:0}</style>

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "GolfStats",
      "url": "https://golfstats.pl",
      "applicationCategory": "SportsApplication",
      "operatingSystem": "Web, iOS, Android",
      "description": "Aplikacja mobilna dla golfistów i trenerów. Śledź statystyki, analizuj grę i współpracuj z trenerem.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "PLN",
        "description": "14 dni za darmo"
      },
      "publisher": {
        "@type": "Organization",
        "name": "GolfStats",
        "url": "https://golfstats.pl",
        "email": "kontakt@golfstats.pl"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
